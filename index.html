<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Juego Pulgoso - Endless Runner</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- El CSS principal está en css/style.css -->
</head>
<body>
  <div id="game-container">
    <h1>Juego Pulgoso</h1>
    <label for="escenario-select" style="font-size:18px;margin-bottom:8px;">Escenario:
      <select id="escenario-select" style="font-size:18px;margin-left:8px;">
        <option value="oficina">Oficina</option>
        <option value="bosque">Bosque</option>
        <option value="desierto">Desierto</option>
        <option value="nieve">Nieve</option>
      </select>
    </label>
    <canvas id="game-canvas"></canvas>
    <div style="margin: 16px 0;">
      <button id="btn-tm-voz" style="font-size:18px;padding:8px 18px;">Activar voz (Teachable Machine)</button>
    </div>
    <p id="hint-text">Toca la pantalla o di <b>salta</b> para jugar.<br>
    Permite el micrófono y la cámara si el navegador lo pide.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/audio"></script>
  <script>
    // Guardar selección de escenario en localStorage y recargar
    const select = document.getElementById('escenario-select');
    select.value = localStorage.getItem('escenario') || 'oficina';
    select.addEventListener('change', function() {
      localStorage.setItem('escenario', select.value);
      location.reload();
    });
  </script>
  <script src="js/teachable_voice.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
