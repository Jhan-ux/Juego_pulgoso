<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, initial-scale=1.0">
  <title>Juego Pulgoso - Endless Runner</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    canvas {
      box-shadow: 0 4px 32px #bbb;
      background: #fff;
      border-radius: 12px;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <h1>Juego Pulgoso</h1>
    <canvas id="game-canvas"></canvas>
    <p id="hint-text">Presiona <b>ESPACIO</b>, <b>↑</b> o <b>TOCA</b> para saltar y empezar.</p>
    <div id="mobile-desc" style="max-width:400px;margin:18px auto 0 auto;color:#1976d2;font-size:1.1em;text-align:center;display:block;">
      <b>IMPORTANTE:</b> Si usas un teléfono o tablet, <b>TOCA LA PANTALLA</b> para iniciar el juego y permitir el acceso a la cámara.<br>
      Si tu navegador pregunta, acepta el permiso de cámara para jugar con gestos.
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>
  <script src="js/game.js"></script>
</body>
</html>
