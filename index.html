<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Juego Pulgoso - Endless Runner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <h1>Juego Pulgoso</h1>
    <label for="escenario-select" style="font-size:18px;margin-bottom:8px;">Escenario:
      <select id="escenario-select" style="font-size:18px;margin-left:8px;">
        <option value="oficina">Oficina</option>
        <option value="bosque">Bosque</option>
        <option value="desierto">Desierto</option>
        <option value="nieve">Nieve</option>
        <option value="prueba">Prueba de salto</option>
      </select>
    </label>
    <canvas id="game-canvas"></canvas>
    <div style="margin: 16px 0;">
      <button id="btn-voz" style="font-size:18px;padding:8px 18px;">Activar voz</button>
    </div>
    <div id="voice-status" class="voice-status" aria-live="polite">
      <strong>Voz:</strong> <span id="voice-state">apagada</span><br>
      <strong>Escuche:</strong> <span id="voice-heard">-</span><br>
      <strong>Comando:</strong> <span id="voice-command">esperando "salta"</span>
    </div>
    <p id="hint-text">Toca la pantalla o di <b>salta</b> para jugar.<br>
    Permite el microfono si el navegador lo pide.</p>
  </div>
  <script>
    const select = document.getElementById('escenario-select');
    select.value = localStorage.getItem('escenario') || 'oficina';
    select.addEventListener('change', function() {
      localStorage.setItem('escenario', select.value);
      location.reload();
    });
  </script>
  <script src="js/reconocimiento_voz.js"></script>
  <script src="js/game.js"></script>
  </body>
  <!-- Integración de TensorFlow.js y keyword spotting (no interfiere con el juego actual) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0/dist/tf.min.js"></script>
  <script src="js/keyword_spotting.js"></script>
  </html>
</body>
</html>
